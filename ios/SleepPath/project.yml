name: SleepPath
options:
  bundleIdPrefix: com.fibonaccilabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  SleepPath:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SleepPath
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: SleepPath/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fibonaccilabs.sleeppath
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "SleepPath"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "SleepPath reads your sleep data from Apple Health to build a daily schedule that adapts to your real sleep patterns."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "SleepPath can update your recommended sleep schedule in Apple Health."
    entitlements:
      path: SleepPath/App/SleepPath.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records

  SleepPathTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SleepPathTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SleepPath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fibonaccilabs.sleeppath.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SleepPath.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SleepPath"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  SleepPath:
    build:
      targets:
        SleepPath: all
        SleepPathTests: [test]
    run:
      config: Debug
      simulateLocation: false
    test:
      config: Debug
      targets:
        - SleepPathTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
